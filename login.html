<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Expense Manager - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>GROUP EXPENSE MANAGER</h1>
            <p class="subtitle">Fair shares, zero stress</p>
            <p class="subtitle-small">Log in to see who's treating next.</p>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash-message">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}
            
            <form method="POST" action="{{ url_for('login') }}">
                <div class="input-group">
                    <input type="text" name="username" placeholder="User Name" required>
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="settle-btn">Settle Up & Enter</button>
            </form>
            
            <div class="google-login">
                <button class="google-btn">
                    <img src="{{ url_for('static', filename='google-icon.png') }}" alt="Google">
                    Log in with Google
                </button>
            </div>
            <p class="appe">Appe</p>
        </div>
    </div>
</body>
</html>
