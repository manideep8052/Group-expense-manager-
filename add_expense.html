<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense - Group Expense Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h2>Group Expense Manager</h2>
            <nav>
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="{{ url_for('add_expense') }}" class="active">Add Expense</a>
                <a href="{{ url_for('all_entries') }}">All Entries</a>
                <a href="{{ url_for('totals') }}">Totals</a>
                <a href="{{ url_for('export_all_pdf') }}">Export Group PDF</a>
                <a href="{{ url_for('logout') }}">Logout</a>
            </nav>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h1>Add Expense</h1>
            </div>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash-message success">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}
            
            <div class="form-container">
                <form method="POST" action="{{ url_for('add_expense') }}">
                    <div class="form-group">
                        <label for="person">Select Member:</label>
                        <select name="person" id="person" required>
                            <option value="">-- Select Member --</option>
                            {% for member in members %}
                            <option value="{{ member }}">{{ member }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="amount">Amount (₹):</label>
                        <input type="number" step="0.01" name="amount" id="amount" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="purpose">Purpose:</label>
                        <input type="text" name="purpose" id="purpose" required>
                    </div>
                    
                    <button type="submit" class="submit-btn">Add Expense</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
